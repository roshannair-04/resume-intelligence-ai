<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Resume Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body class="bg-black text-white">

<div id="particles-js"></div>

<div class="container mx-auto p-10 relative z-20">

<h1 class="text-4xl font-bold mb-6 text-center">
AI Resume Intelligence
</h1>

<div class="bg-slate-900/70 backdrop-blur-xl p-6 rounded-xl shadow-lg">

<label class="block text-sm mb-2">Upload Resume</label>

<div id="uploadBox"
class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center cursor-pointer hover:border-blue-400 transition">

<p class="text-gray-400">
Click to upload resume
</p>

<p class="text-xs text-gray-500 mt-2">
PDF or DOCX
</p>

<input type="file" id="resume" class="hidden">

</div>

<label class="block mb-2 mt-6">Job Description</label>

<textarea id="jobdesc" rows="6"
class="w-full p-3 text-black rounded mb-4"></textarea>

<button id="analyzeBtn"
class="bg-blue-600 hover:bg-blue-500 transition px-6 py-3 rounded-xl font-semibold shadow-lg">
Analyze Resume
</button>

</div>

<div id="results" class="mt-10"></div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
